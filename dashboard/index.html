<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xv6 运行监控</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-mark">XV6</div>
                <div>
                    <p class="sidebar-tag">Module 4</p>
                    <h1>运行监控</h1>
                </div>
            </div>

            <nav class="route-nav">
                <a href="#/processes" data-route-link="processes">进程</a>
                <a href="#/scheduler" data-route-link="scheduler">调度</a>
                <a href="#/memory" data-route-link="memory">内存</a>
                <a href="#/events" data-route-link="events">事件</a>
                <a href="#/home" data-route-link="home">概览</a>
            </nav>

            <section class="sidebar-section panel">
                <div class="section-title">状态</div>
                <div class="status-list">
                    <div class="status-row">
                        <span>链路</span>
                        <strong id="live-status">初始化中</strong>
                    </div>
                    <div class="status-row">
                        <span>策略</span>
                        <strong id="policy-name">UNKNOWN</strong>
                    </div>
                    <div class="status-row">
                        <span>序号</span>
                        <strong id="seq-label">-</strong>
                    </div>
                    <div class="status-row">
                        <span>更新时间</span>
                        <strong id="generated-at">N/A</strong>
                    </div>
                </div>
            </section>

            <section class="sidebar-section panel">
                <div class="section-title">数据源</div>
                <div class="source-card">
                    <code>bash dashboard/scripts/start_monitor.sh</code>
                    <p id="telemetry-source">dashboard/runtime/dashboard-telemetry.log</p>
                </div>
            </section>

            <div id="telemetry-warning" class="warning-banner hidden"></div>
        </aside>

        <main class="workspace">
            <header class="workspace-header">
                <div>
                    <p class="workspace-tag">模块四</p>
                    <h2 id="route-label">进程</h2>
                </div>
                <div class="workspace-meta">
                    <span class="meta-pill">实时刷新</span>
                </div>
            </header>

            <section id="view-root" class="view-root"></section>
        </main>
    </div>
    <script type="module" src="js/main.js"></script>
</body>

</html>
